<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="João Marcelo Angeli Barbosa — desenvolvedor full stack e estudante de Engenharia da Computação. Sistemas web de produção e projetos de sistemas embarcados."
    />
    <meta name="theme-color" content="#0a0d13" />
    <title>João Marcelo Angeli Barbosa — Desenvolvedor Full Stack</title>
    <script>
      (function () {
        var stored = localStorage.getItem('theme')
        var dark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches
        document.documentElement.classList.toggle('dark', dark)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
